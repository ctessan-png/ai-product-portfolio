<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">AI Operations Workflow</title>
  <desc id="desc">A workflow showing order data, quality checks, EDA metrics, AI summary, human review, and operations action.</desc>
  <rect width="1120" height="360" fill="#f7f9fc"/>
  <style>
    .box { fill: #ffffff; stroke: #2f4b7c; stroke-width: 2; rx: 8; }
    .text { font: 18px Arial, sans-serif; fill: #172033; text-anchor: middle; }
    .small { font: 14px Arial, sans-serif; fill: #49566b; text-anchor: middle; }
    .arrow { stroke: #50627a; stroke-width: 3; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#50627a"/>
    </marker>
  </defs>
  <rect class="box" x="40" y="120" width="150" height="90"/>
  <text class="text" x="115" y="158">Order Data</text>
  <text class="small" x="115" y="184">FoodHub records</text>
  <line class="arrow" x1="190" y1="165" x2="260" y2="165"/>
  <rect class="box" x="270" y="120" width="150" height="90"/>
  <text class="text" x="345" y="158">Quality Checks</text>
  <text class="small" x="345" y="184">Ratings, duplicates</text>
  <line class="arrow" x1="420" y1="165" x2="490" y2="165"/>
  <rect class="box" x="500" y="120" width="150" height="90"/>
  <text class="text" x="575" y="158">EDA Metrics</text>
  <text class="small" x="575" y="184">Demand and timing</text>
  <line class="arrow" x1="650" y1="165" x2="720" y2="165"/>
  <rect class="box" x="730" y="120" width="150" height="90"/>
  <text class="text" x="805" y="158">AI Summary</text>
  <text class="small" x="805" y="184">Risks and actions</text>
  <line class="arrow" x1="880" y1="165" x2="950" y2="165"/>
  <rect class="box" x="960" y="120" width="130" height="90"/>
  <text class="text" x="1025" y="158">Human Review</text>
  <text class="small" x="1025" y="184">Approve action</text>
</svg>

